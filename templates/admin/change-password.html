<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Şifre Değiştir</title>

    <link rel="icon" type="image/jpg" href="{{ url_for('static', filename='images/laforet.jpg') }}">

<body>
    <h2>Admin Şifre Değiştir</h2> {% if error %} <p style="color:red;">{{ error }}</p> {% endif %} {% if success %} <p
        style="color:green;">{{ success }}</p> {% endif %} <form method="POST"> <label>Mevcut Şifre</label><br> <input
            type="password" name="current_password" required><br><br> <label>Yeni Şifre</label><br> <input
            type="password" name="new_password" required><br><br> <label>Yeni Şifre (Tekrar)</label><br> <input
            type="password" name="new_password_confirm" required><br><br> <button type="submit">Şifreyi
            Güncelle</button> </form> <br> <a href="{{ url_for('admin_blogs') }}">← Admin Panel</a>
</body>

</html>
